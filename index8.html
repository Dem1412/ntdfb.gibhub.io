        /* เมื่อหน้าจอเล็กลง หรือทรงแนวตั้ง (Mobile/Tablet Portrait) */

<script>
/* JAVASCRIPT ENGINE คงเดิมทั้งหมดตามที่ระบุ ห้ามแก้ */
const CONFIG = {
    steps: [
        { id: 2, label: "🧽 เช็ดคราบ", color: "#22d3ee", sfx: 'wipe' },
        { id: 3, label: "🧹 ปัดฝุ่น", color: "#fbbf24", sfx: 'sweep' },
        { id: 4, label: "🧺 จัดของ", color: "#4ade80", sfx: 'organize' },
        { id: 5, label: "🔑 ใช้งาน", color: "#f472b6", sfx: 'key' }
    ],
    levels: [
        { id: 1, name: "ห้องนอนเจ้าหญิง", size: 11, targetTime: 15, locked: false },
        { id: 2, name: "ห้องครัวเชฟบอย", size: 15, targetTime: 30, locked: false },
        { id: 3, name: "ห้องนั่งเล่นสุดรก", size: 19, targetTime: 45, locked: false },
        { id: 4, name: "ออฟฟิศมหาเศรษฐี", size: 23, targetTime: 60, locked: false },
        { id: 5, name: "สวนหลังบ้านสยอง", size: 27, targetTime: 90, locked: false }
    ]
};

let gameState = {
    activeScreen: 'splash',
    currentLevel: null,
    maze: [],
    player: { x: 0, y: 0, realX: 0, realY: 0 },
    currentStep: 0,
    startTime: 0,
    timer: 0,
    isPaused: false,
    settings: { music: true, sfx: true, volume: 0.5 },
    stats: { totalGames: 0, totalStars: 0, playTime: 0 },
    levelData: {}
};

const AudioEngine = {
    ctx: null,
    masterBus: null,
    musicBus: null,
    bgmNode: null,

    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterBus = this.ctx.createGain();
        this.musicBus = this.ctx.createGain();
        this.masterBus.connect(this.ctx.destination);
        this.musicBus.connect(this.masterBus);
        this.updateVolumes();
        this.startBGM();
    },

    updateVolumes() {
        if (!this.masterBus) return;
        this.masterBus.gain.value = gameState.settings.volume;
        this.musicBus.gain.value = gameState.settings.music ? 0.4 : 0;
    },

    startBGM() {
        const playBeat = () => {
            if (!gameState.settings.music) { setTimeout(playBeat, 1000); return; }
            const now = this.ctx.currentTime;
            const seq = [261.63, 329.63, 392.00, 523.25];
            seq.forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + i * 0.8);
                g.gain.setValueAtTime(0, now + i * 0.8);
                g.gain.linearRampToValueAtTime(0.1, now + i * 0.8 + 0.1);
                g.gain.linearRampToValueAtTime(0, now + i * 0.8 + 0.7);
                osc.connect(g); g.connect(this.musicBus);
                osc.start(now + i * 0.8); osc.stop(now + i * 0.8 + 0.8);
            });
            setTimeout(playBeat, 3200);
        };
        playBeat();
    },

    playSFX(type) {
        if (!gameState.settings.sfx || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.connect(g); g.connect(this.masterBus);
        
        const now = this.ctx.currentTime;
        switch(type) {
            case 'move':
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                g.gain.setValueAtTime(0.05, now);
                g.gain.linearRampToValueAtTime(0, now + 0.1);
                break;
            case 'wipe':
                this.playNoise(0.1, 0.15);
                return;
            case 'collect':
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.2);
                g.gain.setValueAtTime(0.1, now);
                g.gain.linearRampToValueAtTime(0, now + 0.2);
                break;
            case 'win':
                this.playChime();
                return;
        }
        osc.start(); osc.stop(now + 0.3);
    },

    playNoise(dur, vol) {
        const bufSize = this.ctx.sampleRate * dur;
        const buffer = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(vol, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        noise.connect(g); g.connect(this.masterBus);
        noise.start();
    },

    playChime() {
        [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.frequency.setValueAtTime(f, this.ctx.currentTime + i * 0.1);
            g.gain.setValueAtTime(0.1, this.ctx.currentTime + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + i * 0.1 + 0.5);
            osc.connect(g); g.connect(this.masterBus);
            osc.start(this.ctx.currentTime + i * 0.1); osc.stop(this.ctx.currentTime + i * 0.1 + 0.5);
        });
    }
};

const MazeEngine = {
    generate(size) {
        let grid = Array(size).fill().map(() => Array(size).fill(1));
        const stack = [{x: 1, y: 1}];
        grid[1][1] = 0;

        while(stack.length > 0) {
            const curr = stack[stack.length - 1];
            const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
            let found = false;

            for(const [dx, dy] of dirs) {
                const nx = curr.x + dx, ny = curr.y + dy;
                if(nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && grid[ny][nx] === 1) {
                    grid[curr.y + dy/2][curr.x + dx/2] = 0;
                    grid[ny][nx] = 0;
                    stack.push({x: nx, y: ny});
                    found = true;
                    break;
                }
            }
            if(!found) stack.pop();
        }

        const paths = [];
        for(let y=1; y<size-1; y++) for(let x=1; x<size-1; x++) if(grid[y][x] === 0 && (x!==1 || y!==1)) paths.push({x,y});
        paths.sort(() => Math.random() - 0.5);
        
        CONFIG.steps.forEach((step, idx) => {
            const p = paths.pop();
            grid[p.y][p.x] = step.id;
        });

        grid[size-2][size-2] = 9;
        return grid;
    }
};

const Renderer = {
    canvas: null, ctx: null, tileSize: 0,
    
    init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
    },

    render() {
        if(!gameState.currentLevel || gameState.activeScreen !== 'game') return;
        const ctx = this.ctx;
        const size = gameState.currentLevel.size;
        ctx.clearRect(0,0,this.canvas.width, this.canvas.height);

        for(let y=0; y<size; y++) {
            for(let x=0; x<size; x++) {
                const val = gameState.maze[y][x];
                const px = x * this.tileSize;
                const py = y * this.tileSize;

                if(val === 1) {
                    ctx.fillStyle = "#cbd5e1";
                    this.drawRoundedRect(px+2, py+2, this.tileSize-4, this.tileSize-4, 8);
                } else if(val === 9) {
                    ctx.fillStyle = gameState.currentStep >= 4 ? "#10b981" : "#f43f5e";
                    ctx.globalAlpha = 0.2;
                    ctx.fillRect(px, py, this.tileSize, this.tileSize);
                    ctx.globalAlpha = 1;
                    ctx.font = `${this.tileSize*0.4}px Kanit`;
                    ctx.textAlign = "center";
                    ctx.fillText("EXIT", px+this.tileSize/2, py+this.tileSize/1.5);
                } else if(val >= 2 && val <= 5) {
                    ctx.font = `${this.tileSize*0.7}px Arial`;
                    ctx.textAlign = "center";
                    ctx.fillText(CONFIG.steps[val-2].label.split(' ')[0], px+this.tileSize/2, py+this.tileSize/1.3);
                }
            }
        }

        gameState.player.realX += (gameState.player.x - gameState.player.realX) * 0.2;
        gameState.player.realY += (gameState.player.y - gameState.player.realY) * 0.2;

        ctx.fillStyle = "#6366f1";
        ctx.shadowBlur = 15; ctx.shadowColor = "rgba(99,102,241,0.5)";
        ctx.beginPath();
        ctx.arc(gameState.player.realX*this.tileSize + this.tileSize/2, gameState.player.realY*this.tileSize + this.tileSize/2, this.tileSize/3, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        requestAnimationFrame(() => this.render());
    },

    drawRoundedRect(x, y, w, h, r) {
        this.ctx.beginPath();
        this.ctx.moveTo(x+r, y);
        this.ctx.arcTo(x+w, y, x+w, y+h, r);
        this.ctx.arcTo(x+w, y+h, x, y+h, r);
        this.ctx.arcTo(x, y+h, x, y, r);
        this.ctx.arcTo(x, y, x+w, y, r);
        this.ctx.fill();
    }
};

function navTo(screenId) {
    gameState.activeScreen = screenId.replace('screen-','');
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    
    if(screenId === 'screen-level') renderLevelList();
    if(screenId === 'screen-home') AudioEngine.init();
    if(screenId === 'screen-game') {
        gameState.isPaused = false;
        Renderer.init();
        Renderer.render();
    }
}

function renderLevelList() {
    const container = document.getElementById('level-list-scroll');
    container.innerHTML = '';
    CONFIG.levels.forEach(lvl => {
        const data = gameState.levelData[lvl.id] || { stars: 0, bestTime: null };
        const div = document.createElement('div');
        div.className = 'btn btn-s';
        div.style.justifyContent = 'space-between';
        div.innerHTML = `
            <div style="display:flex; align-items:center; gap:15px;">
                <span style="font-size:1.5rem;">🏠</span>
                <div style="text-align:left;">
                    <div style="font-weight:600;">${lvl.name}</div>
                    <small style="color:#94a3b8;">เป้าหมาย: ${lvl.targetTime}s</small>
                </div>
            </div>
            <div style="color:var(--a-color);">${'⭐'.repeat(data.stars)}${'☆'.repeat(3-data.stars)}</div>
        `;
        div.onclick = () => initLevel(lvl.id);
        container.appendChild(div);
    });
}

function initLevel(id) {
    const lvl = CONFIG.levels.find(l => l.id === id);
    gameState.currentLevel = lvl;
    gameState.maze = MazeEngine.generate(lvl.size);
    gameState.player = { x: 1, y: 1, realX: 1, realY: 1 };
    gameState.currentStep = 0;
    gameState.startTime = Date.now();
    gameState.isPaused = false;
    
    const container = document.getElementById('canvas-container');
    const cSize = Math.min(container.clientWidth, container.clientHeight) - 40;
    const canvas = document.getElementById('gameCanvas');
    canvas.width = canvas.height = cSize;
    Renderer.tileSize = cSize / lvl.size;
    
    navTo('screen-game');
    startTimer();
}

function handleMove(dir) {
    if(gameState.isPaused || gameState.activeScreen !== 'game') return;
    let nx = gameState.player.x, ny = gameState.player.y;
    if(dir === 'up') ny--; else if(dir === 'down') ny++;
    else if(dir === 'left') nx--; else if(dir === 'right') nx++;

    if(gameState.maze[ny] && gameState.maze[ny][nx] !== 1) {
        AudioEngine.playSFX('move');
        const cell = gameState.maze[ny][nx];
        
        if(cell >= 2 && cell <= 5) {
            if(cell === gameState.currentStep + 2) {
                gameState.maze[ny][nx] = 0;
                gameState.currentStep++;
                AudioEngine.playSFX('collect');
            }
        }
        
        if(cell === 9 && gameState.currentStep >= 4) {
            winGame();
        }

        gameState.player.x = nx;
        gameState.player.y = ny;
    }
}

function startTimer() {
    const timerEl = document.getElementById('hud-timer');
    const missionEl = document.getElementById('hud-mission');
    
    const loop = () => {
        if(gameState.activeScreen !== 'game') return;
        if(!gameState.isPaused) {
            const now = Date.now();
            gameState.timer = Math.floor((now - gameState.startTime) / 1000);
            const m = Math.floor(gameState.timer/60).toString().padStart(2,'0');
            const s = (gameState.timer%60).toString().padStart(2,'0');
            timerEl.innerText = `${m}:${s}`;
            
            missionEl.innerText = gameState.currentStep < 4 ? 
                CONFIG.steps[gameState.currentStep].label : "✨ ไปทางออก!";
        }
        setTimeout(loop, 1000);
    };
    loop();
}

function winGame() {
    AudioEngine.playSFX('win');
    const time = gameState.timer;
    const target = gameState.currentLevel.targetTime;
    
    let stars = 1;
    if(time <= target) stars = 3;
    else if(time <= target * 1.5) stars = 2;

    const prevData = gameState.levelData[gameState.currentLevel.id] || { stars: 0, bestTime: 999 };
    gameState.levelData[gameState.currentLevel.id] = {
        stars: Math.max(prevData.stars, stars),
        bestTime: Math.min(prevData.bestTime, time)
    };
    
    saveToStorage();
    
    document.getElementById('res-stars').innerText = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
    document.getElementById('res-time-text').innerText = `เวลาที่ทำได้: ${time} วินาที`;
    document.getElementById('res-best-text').innerText = `สถิติเดิม: ${prevData.bestTime === 999 ? '-' : prevData.bestTime + 's'}`;
    navTo('screen-result');
}

function saveToStorage() {
    localStorage.setItem('clean_master_data', JSON.stringify({
        levelData: gameState.levelData,
        settings: gameState.settings,
        stats: gameState.stats
    }));
}

function loadFromStorage() {
    const data = localStorage.getItem('clean_master_data');
    if(data) {
        const parsed = JSON.parse(data);
        gameState.levelData = parsed.levelData || {};
        gameState.settings = parsed.settings || gameState.settings;
        gameState.stats = parsed.stats || gameState.stats;
        
        document.getElementById('check-music').checked = gameState.settings.music;
        document.getElementById('check-sfx').checked = gameState.settings.sfx;
        document.getElementById('vol-range').value = gameState.settings.volume;
    }
}

function saveSettings() {
    gameState.settings.music = document.getElementById('check-music').checked;
    gameState.settings.sfx = document.getElementById('check-sfx').checked;
    gameState.settings.volume = parseFloat(document.getElementById('vol-range').value);
    AudioEngine.updateVolumes();
    saveToStorage();
}

function openOverlay(id) {
    document.getElementById(id).style.display = 'flex';
    gameState.isPaused = true;
    if(id === 'stats-overlay') updateStatsContent();
}

function closeOverlays() {
    document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
    gameState.isPaused = false;
}

function updateStatsContent() {
    let totalS = 0;
    Object.values(gameState.levelData).forEach(d => totalS += d.stars);
    document.getElementById('stats-content').innerHTML = `
        <div>🌟 ดาวทั้งหมดที่เก็บได้: ${totalS}</div>
        <div>🏆 ความสำเร็จสูงสุด: ${totalS >= 10 ? 'มือโปรความสะอาด' : 'นักทำความสะอาดฝึกหัด'}</div>
    `;
}

function resetCurrentLevel() {
    closeOverlays();
    initLevel(gameState.currentLevel.id);
}

window.onload = () => {
    loadFromStorage();
    let progress = 0;
    const interval = setInterval(() => {
        progress += 5;
        document.getElementById('loading-bar').style.width = progress + '%';
        if(progress >= 100) {
            clearInterval(interval);
            navTo('screen-home');
        }
    }, 50);
};

window.addEventListener('keydown', e => {
    if(e.key.startsWith('Arrow')) {
        e.preventDefault();
        handleMove(e.key.replace('Arrow','').toLowerCase());
    }
});
</script>
